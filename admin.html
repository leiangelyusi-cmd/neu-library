<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Admin Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card" style="text-align:center;">
      <h1>Admin Login</h1>
      <p>Sign in with your authorized Google account to access the admin dashboard.</p>
      <button class="btn-google" id="adminLoginBtn">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google"/>
        Sign in with Google
      </button>
      <p class="error-msg" id="errorMsg"></p>
      <br/>
      <a href="index.html" style="font-size:13px; color:#888;">← Back to home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('adminLoginBtn').addEventListener('click', async () => {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: 'https://neu-library.netlify.app/admin.html'
        }
      })
      if (error) {
        document.getElementById('errorMsg').textContent = error.message
      }
    })

    async function checkIfAlreadyAdmin() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) return
      const { data: roleData } = await sb.from('user_roles')
        .select('role').eq('email', session.user.email).single()
      if (roleData?.role === 'admin') {
        window.location.href = 'admin.html'
      }
    }

    checkIfAlreadyAdmin()
  </script>
</body>
</html>
