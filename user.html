<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Thank You</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="card" style="text-align:center;">
      <div class="welcome-box">
        <h2>Welcome to NEU Library!</h2>
        <p id="userName"></p>
        <p style="margin-top:8px; font-size:13px;">Your visit has been logged successfully.</p>
      </div>
      <br/>
      <a href="visitor.html" class="btn-submit" style="display:block; text-decoration:none; text-align:center;">
        Log Another Visit
      </a>
      <br/>
      <button onclick="logout()" style="background:none; border:none; color:#888; cursor:pointer; font-size:13px;">
        Sign Out
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    async function loadUser() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) {
        window.location.href = 'index.html'
        return
      }
      const name = session.user.user_metadata?.full_name || session.user.email
      document.getElementById('userName').textContent = name
    }
    loadUser()
  </script>
</body>
</html>
