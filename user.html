<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Thank You</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="card-page">
    <div class="card" style="text-align:center;">
      <div class="welcome-box">
        <div class="check-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <h2>Welcome!</h2>
        <p id="userName" style="font-weight:600; font-size:15px; margin-bottom:4px;"></p>
        <p>Your visit has been logged successfully.</p>
      </div>

      <a href="visitor.html" class="btn-submit" style="display:block; text-decoration:none; text-align:center; margin-bottom:14px;">
        Log Another Visit
      </a>

      <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:13px; font-family:'DM Sans',sans-serif; padding:4px 8px;">
        Sign Out
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    async function loadUser() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      const name = session.user.user_metadata?.full_name || session.user.email
      document.getElementById('userName').textContent = name
    }
    loadUser()
  </script>
</body>
</html>
