<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Thank You</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page">
    <div class="card md">
      <div class="check-wrap">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="serif">Visit Logged!</h1>
      <p style="font-size:15px; font-weight:600; color:var(--text); margin-bottom:4px;" id="userName"></p>
      <p style="font-size:13px; color:var(--text3); margin-bottom:28px;">Your visit has been recorded successfully.</p>
      <div class="divider"></div>
      <a href="visitor.html" class="btn-primary full" style="margin-bottom:12px;">Log Another Visit</a>
      <button onclick="logout()" class="btn-ghost">Sign Out</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    async function loadUser() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) { window.location.href = 'index.html'; return }
      document.getElementById('userName').textContent = session.user.user_metadata?.full_name || session.user.email
    }
    loadUser()
  </script>
</body>
</html>
