<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Visitor Log</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="card-top">
        <img src="neweralogo.png" alt="NEU"/>
        <div>
          <h1>Log Your Visit</h1>
          <p>NEU Library · Visitor Management</p>
        </div>
      </div>

      <div class="email-badge" id="emailBadge" style="display:none;">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <span id="emailText"></span>
      </div>

      <div class="fg">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name"/>
      </div>

      <div class="fg">
        <label>College / Department</label>
        <select id="college">
          <option value="">— Select College —</option>
          <option>College of Accountancy</option>
          <option>College of Agriculture</option>
          <option>College of Arts and Science</option>
          <option>College of Business Administration</option>
          <option>College of Communication</option>
          <option>College of Informatics and Computing Studies</option>
          <option>College of Criminology</option>
          <option>College of Education</option>
          <option>College of Engineering and Architecture</option>
          <option>College of Medical Technology</option>
          <option>College of Midwifery</option>
          <option>College of Music</option>
          <option>College of Nursing</option>
          <option>College of Physical Therapy</option>
          <option>College of Respiratory Therapy</option>
          <option>School of International Relations</option>
          <option>Graduate School</option>
          <option>Administration / Staff</option>
          <option>Other</option>
        </select>
      </div>

      <div class="fg">
        <label>Purpose of Visit</label>
        <select id="purpose">
          <option value="">— Select Purpose —</option>
          <option>Borrowing books</option>
          <option>Returning books</option>
          <option>Research / Study</option>
          <option>Using computers</option>
          <option>Thesis / Capstone work</option>
          <option>Printing / Photocopying</option>
          <option>Meeting / Group study</option>
          <option>Other</option>
        </select>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="isEmployee"/>
        <label for="isEmployee">I am an employee (teacher or staff)</label>
      </div>

      <div class="fg" id="employeeTypeGroup" style="display:none;">
        <label>Employee Type</label>
        <select id="employeeType">
          <option value="">— Select Type —</option>
          <option>Teacher / Faculty</option>
          <option>Staff</option>
        </select>
      </div>

      <button class="btn-primary full" id="submitBtn">Log My Visit</button>
      <div class="msg error" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    async function init() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) {
        await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://neu-library.netlify.app/visitor.html' } })
        return
      }
      window.currentSession = session
      const badge = document.getElementById('emailBadge')
      badge.style.display = 'inline-flex'
      document.getElementById('emailText').textContent = session.user.email
    }

    document.getElementById('isEmployee').addEventListener('change', function() {
      document.getElementById('employeeTypeGroup').style.display = this.checked ? 'block' : 'none'
    })

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const err = document.getElementById('errorMsg')
      const suc = document.getElementById('successMsg')
      err.textContent = ''; suc.textContent = ''

      const { data: { session } } = await sb.auth.getSession()
      if (!session) { err.textContent = 'Session expired. Please refresh and log in again.'; return }

      const name = document.getElementById('name').value.trim()
      const college = document.getElementById('college').value
      const purpose = document.getElementById('purpose').value
      const isEmployee = document.getElementById('isEmployee').checked
      const employeeType = document.getElementById('employeeType').value

      if (!name || !college || !purpose) { err.textContent = 'Please fill in all required fields.'; return }
      if (isEmployee && !employeeType) { err.textContent = 'Please select your employee type.'; return }

      const { error } = await sb.from('visitors').insert({
        name, email: session.user.email, college, purpose,
        is_employee: isEmployee, employee_type: isEmployee ? employeeType : null
      })

      if (error) { err.textContent = 'Error: ' + error.message; return }
      window.location.href = 'user.html'
    })

    init()
  </script>
</body>
</html>
