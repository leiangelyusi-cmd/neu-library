<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Visitor Log</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding: 20px;">
    <div class="card">
      <h1>Visitor Log</h1>
      <p id="visitorEmail" style="color:#4f8ef7; font-weight:600; margin-bottom:4px;"></p>
      <p>Please fill in your visit details below.</p>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name"/>
      </div>

      <div class="form-group">
        <label>College / Department</label>
        <select id="college">
          <option value="">-- Select College --</option>
          <option>College of Engineering</option>
          <option>College of Business and Accountancy</option>
          <option>College of Arts and Sciences</option>
          <option>College of Education</option>
          <option>College of Computing Studies</option>
          <option>College of Criminal Justice</option>
          <option>College of Nursing</option>
          <option>Graduate School</option>
          <option>Administration / Staff</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Purpose of Visit</label>
        <select id="purpose">
          <option value="">-- Select Purpose --</option>
          <option>Borrowing books</option>
          <option>Returning books</option>
          <option>Research / Study</option>
          <option>Using computers</option>
          <option>Thesis / Capstone work</option>
          <option>Printing / Photocopying</option>
          <option>Meeting / Group study</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group checkbox">
        <input type="checkbox" id="isEmployee"/>
        <label for="isEmployee">I am an employee (teacher or staff)</label>
      </div>

      <div class="form-group" id="employeeTypeGroup" style="display:none;">
        <label>Employee Type</label>
        <select id="employeeType">
          <option value="">-- Select Type --</option>
          <option>Teacher / Faculty</option>
          <option>Staff</option>
        </select>
      </div>

      <button class="btn-submit" id="submitBtn">Log My Visit</button>
      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    let currentSession = null

    async function init() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) {
        const { error } = await sb.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: 'https://neu-library.netlify.app/visitor.html'
          }
        })
        return
      }
      currentSession = session
      document.getElementById('visitorEmail').textContent = session.user.email
    }

    document.getElementById('isEmployee').addEventListener('change', function() {
      document.getElementById('employeeTypeGroup').style.display =
        this.checked ? 'block' : 'none'
    })

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const name = document.getElementById('name').value.trim()
      const college = document.getElementById('college').value
      const purpose = document.getElementById('purpose').value
      const isEmployee = document.getElementById('isEmployee').checked
      const employeeType = document.getElementById('employeeType').value

      const errorMsg = document.getElementById('errorMsg')
      const successMsg = document.getElementById('successMsg')
      errorMsg.textContent = ''
      successMsg.textContent = ''

      if (!name || !college || !purpose) {
        errorMsg.textContent = 'Please fill in all required fields.'
        return
      }

      if (isEmployee && !employeeType) {
        errorMsg.textContent = 'Please select your employee type.'
        return
      }

      const { error } = await sb.from('visitors').insert({
        name,
        email: currentSession?.user?.email || null,
        college,
        purpose,
        is_employee: isEmployee,
        employee_type: isEmployee ? employeeType : null
      })

      if (error) {
        errorMsg.textContent = 'Something went wrong. Please try again.'
        console.error(error)
        return
      }

      window.location.href = 'user.html'
    })

    init()
  </script>
</body>
</html>
