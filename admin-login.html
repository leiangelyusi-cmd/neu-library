<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEU Library – Admin Login</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="page">
    <div class="card sm">
      <img src="neweralogo.png" alt="NEU" style="width:52px; height:52px; margin-bottom:20px;"/>
      <h1 class="serif">Admin Portal</h1>
      <p class="subtitle">Sign in with your authorized Google account to access the admin dashboard.</p>

      <button class="btn-google" id="adminLoginBtn">
        <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google"/>
        Continue with Google
      </button>

      <div class="msg error" id="errorMsg"></div>

      <div class="divider"></div>
      <a href="index.html" class="back-link">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to home
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('adminLoginBtn').addEventListener('click', async () => {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://neu-library.netlify.app/admin.html' }
      })
      if (error) document.getElementById('errorMsg').textContent = error.message
    })

    async function checkIfAlreadyAdmin() {
      const { data: { session } } = await sb.auth.getSession()
      if (!session) return
      const { data: roleData } = await sb.from('user_roles').select('role').eq('email', session.user.email).single()
      if (roleData?.role === 'admin') window.location.href = 'admin.html'
    }

    checkIfAlreadyAdmin()
  </script>
</body>
</html>
